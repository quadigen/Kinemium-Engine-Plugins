name: Build Full Plugin Database

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Update submodules to latest
        run: git submodule update --remote --merge

      - name: Install zstd
        run: sudo apt-get update && sudo apt-get install -y zstd

      - name: Build plugin database
        run: |
          set -e
          sudo apt-get update && sudo apt-get install -y jq zstd
      
          mkdir -p public/plugins public/files
      
          INDEX="public/plugins.json"
          echo '{"version":1,"plugins":[' > "$INDEX"
          FIRST_PLUGIN=true
      
          compress_asset () {
            local src="$1"
            local out="$2"
      
            if [ -f "$src" ]; then
              mkdir -p "$(dirname "$out")"
              zstd -q -10 -T0 --no-progress "$src" -o "$out"
              echo "$out.zst"
            else
              echo ""
            fi
          }
      
          for plugin in plugins/*; do
            [ -d "$plugin" ] || continue
            name=$(basename "$plugin")
            manifest="$plugin/manifest.json"
            [ -f "$manifest" ] || continue
      
            manifest_inline=$(cat "$manifest")
      
            icon=$(echo "$manifest_inline" | jq -r '.icon // empty')
            thumbnail=$(echo "$manifest_inline" | jq -r '.thumbnail // empty')
      
            icon_url=""
            thumbnail_url=""
      
            if [ -n "$icon" ]; then
              icon_url=$(compress_asset "$plugin/$icon" "public/files/$name/$icon")
            fi
      
            if [ -n "$thumbnail" ]; then
              thumbnail_url=$(compress_asset "$plugin/$thumbnail" "public/files/$name/$thumbnail")
            fi
      
            file_entries=""
            FIRST_FILE=true
      
            while IFS= read -r -d '' file; do
              rel="${file#"$plugin/"}"
      
              # skip manifest + media already handled
              if [ "$rel" = "manifest.json" ]; then
                continue
              fi
              if [ "$rel" = "$icon" ] || [ "$rel" = "$thumbnail" ]; then
                continue
              fi
      
              out="public/files/$name/$rel.zst"
              mkdir -p "$(dirname "$out")"
              zstd -q -10 -T0 --no-progress "$file" -o "$out"
      
              entry='{"path":"'"$rel"'","url":"/files/'"$name"'/'"$rel"'.zst"}'
      
              if [ "$FIRST_FILE" = false ]; then
                file_entries="$file_entries,$entry"
              else
                file_entries="$entry"
              fi
              FIRST_FILE=false
      
            done < <(find "$plugin" -type f -print0)
      
            if [ "$FIRST_PLUGIN" = false ]; then
              echo ',' >> "$INDEX"
            fi
            FIRST_PLUGIN=false
      
            echo '{"manifest":'"$manifest_inline"',"icon":"'"$icon_url"'","thumbnail":"'"$thumbnail_url"'","files":['"$file_entries"']}' \
              > "public/plugins/$name.json"
      
            echo -n '{"manifest":'"$manifest_inline"',"icon":"'"$icon_url"'","thumbnail":"'"$thumbnail_url"'","url":"/plugins/'"$name"'.json"}' >> "$INDEX"
          done
      
          echo ']}' >> "$INDEX"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Pages
        uses: actions/deploy-pages@v4
