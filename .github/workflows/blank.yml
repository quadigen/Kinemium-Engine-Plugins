name: Build Full Plugin Database

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Update submodules to latest
        run: git submodule update --remote --merge

      - name: Install zstd
        run: sudo apt-get update && sudo apt-get install -y zstd

      - name: Build plugin database
        run: |
          set -e
          mkdir -p public/plugins public/files
      
          INDEX="public/plugins.json"
          echo '{"version":1,"plugins":[' > "$INDEX"
          FIRST_PLUGIN=true
      
          for plugin in plugins/*; do
            [ -d "$plugin" ] || continue
            name=$(basename "$plugin")
            manifest="$plugin/manifest.json"
            [ -f "$manifest" ] || continue
      
            # Compress and stage all files
            plugin_files_json="[]"
            file_entries=""
            FIRST_FILE=true
      
            while IFS= read -r -d '' file; do
              rel="${file#"$plugin/"}"
              out="public/files/$name/$rel.zst"
              mkdir -p "$(dirname "$out")"
              zstd -q -10 -T0 --no-progress "$file" -o "$out"
      
              entry='{"path":"'"$rel"'","url":"/files/'"$name"'/'"$rel"'.zst"}'
              if [ "$FIRST_FILE" = false ]; then
                file_entries="$file_entries,$entry"
              else
                file_entries="$entry"
              fi
              FIRST_FILE=false
            done < <(find "$plugin" -type f -print0)
      
            # Inline manifest into the index — client never needs to fetch files to browse
            manifest_inline=$(cat "$manifest")
      
            if [ "$FIRST_PLUGIN" = false ]; then echo ',' >> "$INDEX"; fi
            FIRST_PLUGIN=false
      
            # Write slim per-plugin record (files only, manifest already in index)
            echo '{"manifest":'"$manifest_inline"',"files":['"$file_entries"']}' \
              > "public/plugins/$name.json"
      
            echo -n '{"manifest":'"$manifest_inline"',"url":"/plugins/'"$name"'.json"}' >> "$INDEX"
          done
      
          echo ']}' >> "$INDEX"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Pages
        uses: actions/deploy-pages@v4
