name: Build Full Plugin Database

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build plugin database
        run: |
          mkdir -p public

          OUTPUT="public/plugins.json"
          echo "{" > $OUTPUT
          echo "\"plugins\": [" >> $OUTPUT

          FIRST_PLUGIN=true

          for plugin in plugins/*; do
            if [ -d "$plugin" ]; then

              name=$(basename "$plugin")

              if [ "$FIRST_PLUGIN" = false ]; then
                echo "," >> $OUTPUT
              fi
              FIRST_PLUGIN=false

              echo "{" >> $OUTPUT
              echo "\"name\":\"$name\"," >> $OUTPUT
              echo "\"files\":[" >> $OUTPUT

              FIRST_FILE=true

              for file in $(find "$plugin" -type f); do
                rel=${file#"$plugin/"}
                content=$(base64 -w 0 "$file")

                if [ "$FIRST_FILE" = false ]; then
                  echo "," >> $OUTPUT
                fi
                FIRST_FILE=false

                echo "{" >> $OUTPUT
                echo "\"path\":\"$rel\"," >> $OUTPUT
                echo "\"content\":\"$content\"" >> $OUTPUT
                echo "}" >> $OUTPUT
              done

              echo "]" >> $OUTPUT
              echo "}" >> $OUTPUT
            fi
          done

          echo "]}" >> $OUTPUT

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Pages
        uses: actions/deploy-pages@v4
