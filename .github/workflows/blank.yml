name: Build Full Plugin Database

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Update submodules to latest
        run: git submodule update --remote --merge

      - name: Install zstd
        run: sudo apt-get update && sudo apt-get install -y zstd

      - name: Build plugin database
        run: |
          set -e
      
          mkdir -p public/plugins
          mkdir -p public/files
      
          INDEX="public/plugins.json"
          echo '{"plugins":[' > "$INDEX"
      
          FIRST_PLUGIN=true
      
          for plugin in plugins/*; do
            [ -d "$plugin" ] || continue
            name=$(basename "$plugin")
      
            plugin_json="public/plugins/$name.json"
            echo '{"name":"'"$name"'","files":[' > "$plugin_json"
      
            FIRST_FILE=true
      
            # iterate files safely
            while IFS= read -r -d '' file; do
              rel="${file#"$plugin/"}"
              out="public/files/$name/$rel.zst"
      
              mkdir -p "$(dirname "$out")"
      
              # compress (fast + good ratio)
              zstd -q -10 -T0 --no-progress "$file" -o "$out"
      
              if [ "$FIRST_FILE" = false ]; then
                echo ',' >> "$plugin_json"
              fi
              FIRST_FILE=false
      
              echo -n '{"path":"'"$rel"'","url":"/files/'"$name"'/'"$rel"'.zst"}' >> "$plugin_json"
      
            done < <(find "$plugin" -type f -print0)
      
            echo ']}' >> "$plugin_json"
      
            if [ "$FIRST_PLUGIN" = false ]; then
              echo ',' >> "$INDEX"
            fi
            FIRST_PLUGIN=false
      
            echo -n '{"name":"'"$name"'","url":"/plugins/'"$name"'.json"}' >> "$INDEX"
      
          done
      
          echo ']}' >> "$INDEX"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Pages
        uses: actions/deploy-pages@v4
