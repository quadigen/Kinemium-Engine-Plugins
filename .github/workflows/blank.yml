name: Build Full Plugin Database

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Update submodules to latest
        run: git submodule update --remote --merge

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq zstd

      - name: Build plugin database
        run: |
          set -euo pipefail

          mkdir -p public/plugins public/files

          # Returns a data URI for an image file, or empty string
          get_data_uri() {
            local src="$1"
            [[ -f "$src" ]] || return 0
            local ext="${src##*.}"
            local mime
            case "${ext,,}" in
              png)       mime="image/png" ;;
              jpg|jpeg)  mime="image/jpeg" ;;
              webp)      mime="image/webp" ;;
              gif)       mime="image/gif" ;;
              *)         mime="application/octet-stream" ;;
            esac
            echo "data:$mime;base64,$(base64 -w 0 "$src")"
          }

          plugin_index_entries=()

          for plugin_dir in plugins/*/; do
            [[ -d "$plugin_dir" ]] || continue
            name=$(basename "$plugin_dir")
            manifest="$plugin_dir/manifest.json"

            if [[ ! -f "$manifest" ]]; then
              echo "⚠ Skipping $name: missing manifest.json"
              continue
            fi

            if ! manifest_json=$(jq '.' "$manifest" 2>/dev/null); then
              echo "⚠ Skipping $name: invalid manifest JSON"
              continue
            fi

            icon=$(jq -r '.icon // empty' <<< "$manifest_json")
            thumbnail=$(jq -r '.thumbnail // empty' <<< "$manifest_json")

            icon_data=$(get_data_uri "$plugin_dir/$icon")
            thumbnail_data=$(get_data_uri "$plugin_dir/$thumbnail")

            # Compress all non-manifest, non-media files and build the files array
            file_entries=()
            while IFS= read -r -d '' file; do
              rel="${file#"$plugin_dir"}"
              [[ "$rel" == "manifest.json" ]] && continue
              [[ "$rel" == "$icon" || "$rel" == "$thumbnail" ]] && continue

              out="public/files/$name/$rel.zst"
              mkdir -p "$(dirname "$out")"
              zstd -q -10 -T0 --no-progress "$file" -o "$out"

              file_entries+=("$(jq -nc \
                --arg path "$rel" \
                --arg url "/files/$name/$rel.zst" \
                '{path: $path, url: $url}')")
            done < <(find "$plugin_dir" -type f -print0)

            files_array=$(IFS=,; echo "[${file_entries[*]}]")

            # Write individual plugin JSON
            jq -n \
              --argjson manifest "$manifest_json" \
              --arg icon "$icon_data" \
              --arg thumbnail "$thumbnail_data" \
              --argjson files "$files_array" \
              '{manifest: $manifest, icon: $icon, thumbnail: $thumbnail, files: $files}' \
              > "public/plugins/$name.json"

            # Collect index entry (no files array, has url instead)
            plugin_index_entries+=("$(jq -n \
              --argjson manifest "$manifest_json" \
              --arg icon "$icon_data" \
              --arg thumbnail "$thumbnail_data" \
              --arg url "/plugins/$name.json" \
              '{manifest: $manifest, icon: $icon, thumbnail: $thumbnail, url: $url}')")

            echo "✓ $name"
          done

          # Write final index
          index_array=$(IFS=,; echo "[${plugin_index_entries[*]}]")
          jq -n --argjson plugins "$index_array" '{version: 1, plugins: $plugins}' \
            > public/plugins.json

          echo "Built ${#plugin_index_entries[@]} plugin(s)"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
